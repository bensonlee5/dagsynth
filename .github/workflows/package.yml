name: package

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git ref to build and publish from
        required: false
        default: main
        type: string
      expected_version:
        description: Expected pyproject.toml version for safety checks
        required: false
        default: ""
        type: string

concurrency:
  group: package-publish
  cancel-in-progress: false

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_publish: ${{ steps.plan.outputs.should_publish }}
      version: ${{ steps.plan.outputs.version }}
      source_ref: ${{ steps.target.outputs.source_ref }}
      source_sha: ${{ steps.source.outputs.source_sha }}

    steps:
      - name: Resolve source ref
        id: target
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SOURCE_REF="${{ inputs.source_ref }}"
          else
            SOURCE_REF="${{ github.ref }}"
          fi
          echo "source_ref=${SOURCE_REF}" >> "$GITHUB_OUTPUT"

      - name: Checkout workflow ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: .workflow-src

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.target.outputs.source_ref }}

      - name: Record source sha
        id: source
        shell: bash
        run: echo "source_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Evaluate publish plan
        id: plan
        env:
          EXPECTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_version || '' }}
          TAG_NAME: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        shell: bash
        run: |
          args=(
            --package-name dagzoo
            --pyproject pyproject.toml
          )
          if [[ -n "${EXPECTED_VERSION}" ]]; then
            args+=(--expected-version "${EXPECTED_VERSION}")
          fi
          if [[ -n "${TAG_NAME}" ]]; then
            args+=(--tag-name "${TAG_NAME}")
          fi
          python .workflow-src/scripts/release/publish_plan.py "${args[@]}"

  build:
    if: needs.resolve-release.outputs.should_publish == 'true'
    needs: resolve-release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source sha
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-release.outputs.source_sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Build sdist and wheel
        run: uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.resolve-release.outputs.version }}
          path: dist/
          retention-days: 30

  publish-pypi:
    if: needs.resolve-release.outputs.should_publish == 'true'
    needs:
      - resolve-release
      - build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.resolve-release.outputs.version }}
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    if: >-
      needs.resolve-release.outputs.should_publish == 'true'
      && startsWith(github.ref, 'refs/tags/v')
    needs:
      - resolve-release
      - build
      - publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.resolve-release.outputs.version }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
