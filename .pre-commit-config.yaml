repos:

- repo: local
  hooks:
  - id: ruff-check
    name: ruff check
    entry: ./.venv/bin/ruff check
    language: system
    types_or: [python, pyi]
    pass_filenames: true
  - id: ruff-format
    name: ruff format
    entry: ./.venv/bin/ruff format
    language: system
    types_or: [python, pyi]
    pass_filenames: true
  - id: mypy
    name: mypy
    entry: ./.venv/bin/python -m mypy src
    language: system
    types_or: [python, pyi]
    pass_filenames: false
  - id: mdformat
    name: mdformat
    entry: ./.venv/bin/mdformat
    language: system
    types: [markdown]
    exclude: ^(WORKFLOW\.md|docs/transforms.md|site/)
    pass_filenames: true
  - id: deptry
    name: deptry
    entry: ./.venv/bin/deptry .
    language: system
    pass_filenames: false
    files: ^(pyproject\.toml|src/dagzoo/)
  - id: release-contract
    name: release contract
    entry: ./.venv/bin/python scripts/dev.py contract --source staged
    language: system
    pass_filenames: false
    files: ^(src/dagzoo/|configs/|scripts/devlib/|pyproject\.toml$|CHANGELOG\.md$|\.pre-commit-config\.yaml$)
