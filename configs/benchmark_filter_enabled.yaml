seed: 123

dataset:
  task: classification
  n_train: 512
  n_test: 128
  n_features_min: 16
  n_features_max: 48
  n_classes_min: 2
  n_classes_max: 10
  categorical_ratio_min: 0.0
  categorical_ratio_max: 1.0
  max_categorical_cardinality: 12

graph:
  n_nodes_min: 2
  n_nodes_max: 24

runtime:
  device: cpu
  torch_dtype: float32

output:
  out_dir: data/benchmark_filter
  shard_size: 128
  compression: zstd

benchmark:
  preset_name: filter
  suite: standard
  num_datasets: 100
  warmup_datasets: 10
  warn_threshold_pct: 10.0
  fail_threshold_pct: 20.0
  collect_memory: true
  collect_reproducibility: false
  reproducibility_num_datasets: 2
  latency_num_samples: 20
  presets:
    filter:
      device: cpu
      num_datasets: 100
      warmup_datasets: 10

filter:
  enabled: true
  n_estimators: 25
  max_depth: 6
  max_features: auto
  n_bootstrap: 200
  threshold: 0.5
  max_attempts: 10
  n_jobs: -1
