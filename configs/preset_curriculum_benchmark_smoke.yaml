seed: 41
curriculum_stage: auto

dataset:
  task: classification
  n_train: 128
  n_test: 32
  n_features_min: 8
  n_features_max: 24
  n_classes_min: 2
  n_classes_max: 8

graph:
  n_nodes_min: 2
  n_nodes_max: 12

runtime:
  device: cpu

output:
  out_dir: data/run_curriculum_benchmark_smoke
  shard_size: 16
  compression: zstd

curriculum:
  stages:
    1:
      n_features_min: 8
      n_features_max: 12
      n_nodes_min: 2
      n_nodes_max: 6
      depth_min: 1
      depth_max: 2
    2:
      n_features_min: 12
      n_features_max: 18
      n_nodes_min: 4
      n_nodes_max: 9
      depth_min: 2
      depth_max: 4
    3:
      n_features_min: 18
      n_features_max: 24
      n_nodes_min: 8
      n_nodes_max: 12
      depth_min: 3
      depth_max: 6

diagnostics:
  enabled: false

benchmark:
  profile_name: curriculum_smoke
  suite: smoke
  num_datasets: 20
  warmup_datasets: 0
  warn_threshold_pct: 10.0
  fail_threshold_pct: 20.0
  collect_memory: false
  collect_reproducibility: false
  reproducibility_num_datasets: 1
  latency_num_samples: 5
  profiles:
    curriculum_smoke:
      device: cpu
      num_datasets: 20
      warmup_datasets: 0

filter:
  enabled: false
